<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Expense Tracker</h1>
            <p class="subtitle">Track your spending and manage your budget</p>
        </header>

        <main>
            <!-- Summary Section -->
            <section class="summary-section">
                <div class="summary-card">
                    <h3>Total Income</h3>
                    <p class="amount income-amount">$0.00</p>
                </div>
                <div class="summary-card">
                    <h3>Total Expenses</h3>
                    <p class="amount expense-amount">$0.00</p>
                </div>
                <div class="summary-card">
                    <h3>Balance</h3>
                    <p class="amount balance-amount">$0.00</p>
                </div>
            </section>

            <!-- Input Section -->
            <section class="input-section">
                <h2>Add Transaction</h2>
                <form id="transactionForm">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input 
                            type="text" 
                            id="description" 
                            placeholder="e.g., Grocery shopping"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input 
                            type="number" 
                            id="amount" 
                            placeholder="0.00"
                            step="0.01"
                            min="0"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">Select a category</option>
                            <option value="Food">🍔 Food</option>
                            <option value="Transportation">🚗 Transportation</option>
                            <option value="Entertainment">🎬 Entertainment</option>
                            <option value="Utilities">💡 Utilities</option>
                            <option value="Healthcare">🏥 Healthcare</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Education">📚 Education</option>
                            <option value="Other">📌 Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="type">Type</label>
                        <div class="type-selector">
                            <input 
                                type="radio" 
                                id="expense" 
                                name="type" 
                                value="expense"
                                checked
                            >
                            <label for="expense" class="radio-label">Expense</label>

                            <input 
                                type="radio" 
                                id="income" 
                                name="type" 
                                value="income"
                            >
                            <label for="income" class="radio-label">Income</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="date">Date</label>
                        <input 
                            type="date" 
                            id="date"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-submit">Add Transaction</button>
                </form>
            </section>

            <!-- Filters Section -->
            <section class="filters-section">
                <div class="filter-group">
                    <label for="filterType">Filter by Type:</label>
                    <select id="filterType">
                        <option value="">All</option>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filterCategory">Filter by Category:</label>
                    <select id="filterCategory">
                        <option value="">All Categories</option>
                        <option value="Food">🍔 Food</option>
                        <option value="Transportation">🚗 Transportation</option>
                        <option value="Entertainment">🎬 Entertainment</option>
                        <option value="Utilities">💡 Utilities</option>
                        <option value="Healthcare">🏥 Healthcare</option>
                        <option value="Shopping">🛍️ Shopping</option>
                        <option value="Education">📚 Education</option>
                        <option value="Other">📌 Other</option>
                    </select>
                </div>

                <button class="btn-clear-filters" id="clearFilters">Clear Filters</button>
                <button class="btn-export" id="exportBtn">📥 Export CSV</button>
            </section>

            <!-- Transactions List -->
            <section class="transactions-section">
                <h2>Transactions</h2>
                <div id="transactionsList" class="transactions-list">
                    <p class="no-transactions">No transactions yet. Add one to get started!</p>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
